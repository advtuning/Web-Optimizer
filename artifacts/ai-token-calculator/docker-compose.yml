# docker-compose.yml — AI Token Calculator
#
# Run from this directory:
#   docker compose up -d --build
#
# Then open http://localhost:8080
#
# The build context is the monorepo root (../..) because the Vite build needs
# pnpm-workspace.yaml, the lockfile, and the lib/ packages to resolve deps.

services:
  ai-token-calculator:
    container_name: ai-token-calculator
    build:
      context: ../..
      dockerfile: artifacts/ai-token-calculator/Dockerfile
      args:
        # Set this to a sub-path (e.g. "/calc/") if you serve the app from a
        # path prefix behind a reverse proxy. Must end with a trailing slash.
        BASE_PATH: /
    image: ai-token-calculator:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
