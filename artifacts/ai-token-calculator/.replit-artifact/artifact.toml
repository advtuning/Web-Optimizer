kind = "web"
previewPath = "/"
title = "AI Token Calculator"
version = "1.0.0"
id = "artifacts/ai-token-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19199

[services.development]
run = "pnpm --filter @workspace/ai-token-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-token-calculator", "run", "build" ]
publicDir = "artifacts/ai-token-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19199"
BASE_PATH = "/"
